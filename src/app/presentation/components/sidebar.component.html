<nav class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <div class="logo-icon">S</div>
      <span class="logo-text">Symbiosis</span>
    </div>
  </div>

  <div class="nav-section">
    <a routerLink="/clientes" routerLinkActive="active" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="nav-label">Clientes</span>
    </a>
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/cuenta" routerLinkActive="active" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Cuenta</span>
    </a>
  </div>

  <div class="sidebar-bottom">
    @if (usuario(); as user) {
      <div class="user-info">
        <i class="pi pi-user user-avatar"></i>
        <span class="user-name">{{ user.nombre }}</span>
      </div>
    }
    <p-button
      (onClick)="logout()"
      icon="pi pi-sign-out"
      label="Logout"
      [text]="true"
      severity="secondary"
      styleClass="logout-btn" />
  </div>
</nav>
