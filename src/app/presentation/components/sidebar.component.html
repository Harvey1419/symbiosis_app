<nav class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <div class="logo-icon">S</div>
      <span class="logo-text">Symbiosis</span>
    </div>
    <button class="collapse-btn" (click)="toggleCollapse()" [attr.aria-label]="collapsed() ? 'Expandir' : 'Colapsar'">
      <i class="pi pi-bars"></i>
    </button>
  </div>

  <div class="nav-section">
    @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="9" x2="15" y2="9"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="13" y2="17"/>
        </svg>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>

  <div class="sidebar-bottom">
    @if (usuario(); as u) {
      <div class="user-info">
        <div class="user-avatar">{{ u.nombre.charAt(0).toUpperCase() }}</div>
        <span class="user-name">{{ u.nombre }}</span>
      </div>
    }
    <div class="sidebar-actions">
      <app-theme-toggle></app-theme-toggle>
      <button class="nav-item logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </div>
</nav>
