<nav class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-top">
    <div class="sidebar-logo">
      <div class="logo-icon">S</div>
      <span class="logo-text">Symbiosis</span>
    </div>
    <button class="collapse-btn" (click)="toggleCollapse()" [attr.aria-label]="collapsed() ? 'Expandir' : 'Colapsar'">
      <i class="pi pi-bars"></i>
    </button>
  </div>

  <div class="nav-section">
    <a routerLink="/clientes" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="nav-label">Clientes</span>
    </a>
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/cuenta" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Cuenta</span>
    </a>
  </div>

  <div class="sidebar-bottom">
    @if (usuario(); as u) {
      <div class="user-info">
        <div class="user-avatar">{{ u.nombre.charAt(0).toUpperCase() }}</div>
        <span class="user-name">{{ u.nombre }}</span>
      </div>
    }
    <button class="nav-item logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="nav-label">Logout</span>
    </button>
  </div>
</nav>
