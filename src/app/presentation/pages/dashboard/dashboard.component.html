<div class="dashboard">
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Bienvenido@</h1>
      <p class="subtitle">Gestiona la causacion contable de tus clientes</p>
    </div>
    <div class="header-actions">
      <a routerLink="/clientes" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Ver Clientes
      </a>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ clientes().length }}</span>
        <span class="stat-label">Clientes</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon pending">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ facturasPendientes() }}</span>
        <span class="stat-label">Pendientes</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon success">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ facturasCausadas() }}</span>
        <span class="stat-label">Causadas</span>
      </div>
    </div>
  </div>

  @if (loading()) {
    <div class="loading-state">
      <span class="spinner"></span>
      <p>Cargando informacion...</p>
    </div>
  }
</div>
