<div class="dashboard">
  <ng-template #actionTpl>
    <a routerLink="/clientes" class="btn-primary">
      <i class="pi pi-users"></i>
      Ver Clientes
    </a>
  </ng-template>

  <app-page-header
    [title]="usuario() ? 'Bienvenido, ' + usuario()!.nombre : 'Bienvenido'"
    subtitle="Gestiona la causacion contable de tus clientes"
    [actionRef]="actionTpl" />

  <div class="stats-grid">
    <app-stat-card
      label="Clientes"
      [value]="totalClientes()"
      iconClass="pi pi-users" />

    <app-stat-card
      label="Pendientes"
      [value]="facturasPendientes()"
      iconClass="pi pi-clock"
      variant="pending" />

    <app-stat-card
      label="Causadas"
      [value]="facturasCausadas()"
      iconClass="pi pi-check-circle"
      variant="success" />
  </div>

  @if (loading()) {
    <app-loading-state message="Cargando informacion..." />
  } @else if (error(); as err) {
    <app-error-banner [message]="err" />
  } @else if (totalClientes() === 0 && facturas().length === 0) {
    <app-empty-state
      title="Sin datos para mostrar"
      description="Cuando sincronices clientes y facturas, veras aqui el resumen."
      iconClass="pi pi-chart-bar" />
  }
</div>
