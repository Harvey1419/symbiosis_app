@if (showSidebar) {
  <div class="app-layout" [class.layout-collapsed]="sidebarService.collapsed()">
    <button
      class="sidebar-toggle"
      (click)="sidebarService.toggle()"
      [attr.aria-label]="sidebarService.collapsed() ? 'Expandir sidebar' : 'Colapsar sidebar'"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        @if (sidebarService.collapsed()) {
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        } @else {
          <line x1="3" y1="6" x2="15" y2="6"/>
          <line x1="3" y1="12" x2="15" y2="12"/>
          <line x1="3" y1="18" x2="15" y2="18"/>
          <circle cx="19" cy="12" r="2" fill="currentColor" stroke="none"/>
        }
      </svg>
    </button>
    <app-sidebar />
    <main class="main-content" [class.sidebar-collapsed]="sidebarService.collapsed()">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
